<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chococlube</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css" />
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="./"><img src="./logo.png" alt="Logo"><strong>Chococlube</strong></a>
    <div class="search"><input type="text" placeholder="Buscar chocolates"></div>
  </div>
</header>
<main class="container" id="app"></main>
<div class="footer">Oferta promocional • primeira compra com frete</div>
<div class="modal" id="modal">
  <div class="panel">
    <button class="close" id="closeModal">×</button>
    <div id="modalContent"></div>
  </div>
</div>
<script>
const app = document.getElementById('app');
const modal = document.getElementById('modal');
const modalContent = document.getElementById('modalContent');
document.getElementById('closeModal').onclick = () => modal.classList.remove('show');
modal.onclick = (e)=>{ if(e.target===modal) modal.classList.remove('show'); };
let state = { data:null, qty:1, address:{cep:'',logradouro:'',bairro:'',localidade:'',uf:'',numero:'',complemento:''}, selectedCarrier:null };
function money(v){ return 'R$ ' + v; }
function getProductById(id){ for(const s of state.data.sections){ for(const p of s.products){ if(String(p.id)===String(id)) return {...p, category:s.title}; } } return null; }
function route(){ const url = new URL(location.href); return url.searchParams.get('product'); }
async function loadData(){ const res = await fetch('./data/products.json', {cache:'no-store'}); if(!res.ok) throw new Error('Falha ao carregar produtos'); state.data = await res.json(); render(); }
function renderHome(){
  app.innerHTML = `<section class="hero"><img src="./header.png" alt="Promoção"></section>` +
    state.data.sections.map(section => `
      <section class="section">
        <h2>${section.title}</h2>
        <div class="grid">
          ${section.products.map(p => `
            <article class="card">
              <img src="${p.img}" alt="${p.name}">
              <div class="name">${p.name}</div>
              <span class="badge">${p.badge}</span>
              <div class="old">${money(p.oldPrice)}</div>
              <div class="price">${money(p.price)}</div>
              <button class="buy" data-product="${p.id}">COMPRAR AGORA</button>
            </article>`).join('')}
        </div>
      </section>`).join('');
  document.querySelectorAll('[data-product]').forEach(btn=>btn.onclick=()=>{ location.href = `./?product=${btn.dataset.product}`; });
}
function renderProduct(product){
  app.innerHTML = `
    <div class="breadcrumb"><a href="./">HOME</a> › PÁSCOA › ${product.category} › ${product.name}</div>
    <section class="product">
      <div class="imagebox"><img src="${product.img}" alt="${product.name}"></div>
      <div class="meta">
        <h1>${product.name}</h1>
        <div class="muted">SKU #${String(product.id).padStart(6,'0')}</div>
        <p class="desc">Celebre a Páscoa com chocolate especial e uma oferta pensada para conversão.</p>
        <div style="display:flex;gap:12px;align-items:baseline;margin-top:10px"><div class="old">${money(product.oldPrice)}</div><div class="price">${money(product.price)} <small>/un</small></div></div>
        <div class="qty"><button id="minus">−</button><span id="qtyVal">${state.qty}</span><button id="plus">+</button></div>
        <div class="promo">PROMOÇÃO: pague apenas o frete na primeira compra.</div>
        <button class="primary green" id="openCheckout">COMPRAR AGORA</button>
      </div>
    </section>`;
  document.getElementById('minus').onclick = ()=>{ state.qty = Math.max(1, state.qty-1); document.getElementById('qtyVal').textContent = state.qty; };
  document.getElementById('plus').onclick = ()=>{ state.qty += 1; document.getElementById('qtyVal').textContent = state.qty; };
  document.getElementById('openCheckout').onclick = ()=>openCheckout();
}
function openCheckout(){
  state.selectedCarrier = null;
  modalContent.innerHTML = `
    <h2 style="margin-top:0">Cadastrar Novo Endereço</h2>
    <div class="group"><label>CEP</label><input id="cep" maxlength="8" placeholder="Digite seu CEP"></div>
    <div id="addressFields" class="hidden">
      <div class="group"><label>Logradouro</label><input id="logradouro" disabled></div>
      <div class="row">
        <div class="group"><label>Número</label><input id="numero" placeholder="Digite o número"></div>
        <div class="group"><label>Complemento</label><input id="complemento" placeholder="Apto, sala, etc."></div>
      </div>
      <div class="group"><label>Bairro</label><input id="bairro" disabled></div>
      <div class="row">
        <div class="group"><label>Cidade</label><input id="localidade" disabled></div>
        <div class="group"><label>UF</label><input id="uf" disabled></div>
      </div>
      <button class="primary green" id="confirmAddress">Confirmar Endereço</button>
    </div>`;
  modal.classList.add('show');
  document.getElementById('cep').addEventListener('input', async (e)=>{
    const cep = e.target.value.replace(/\D/g,'').slice(0,8); e.target.value = cep; if(cep.length!==8) return;
    try{
      const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`); const data = await res.json();
      if(data.erro) return;
      state.address = {...state.address, cep:data.cep||cep, logradouro:data.logradouro||'', bairro:data.bairro||'', localidade:data.localidade||'', uf:data.uf||''};
      document.getElementById('addressFields').classList.remove('hidden');
      ['logradouro','bairro','localidade','uf'].forEach(k=>document.getElementById(k).value = state.address[k] || '');
    }catch(err){ alert('Não foi possível consultar o CEP agora.'); }
  });
  document.addEventListener('click', function handler(e){
    if(e.target && e.target.id==='confirmAddress'){
      state.address.numero = document.getElementById('numero').value.trim();
      state.address.complemento = document.getElementById('complemento').value.trim();
      if(!state.address.numero){ alert('Digite o número.'); return; }
      document.removeEventListener('click', handler);
      renderCarrierStep();
    }
  });
}
function renderCarrierStep(){
  modalContent.innerHTML = `
    <button class="back" id="backToAddress">Voltar</button>
    <h3>Selecione a transportadora</h3>
    <div class="carrier" id="jadlog">JADLOG - R$ 31,40</div>
    <button class="primary" id="toReceiver" disabled style="margin-top:16px">Continuar</button>`;
  document.getElementById('backToAddress').onclick = openCheckout;
  document.getElementById('jadlog').onclick = ()=>{ state.selectedCarrier='JADLOG'; document.getElementById('jadlog').classList.add('active'); document.getElementById('toReceiver').disabled=false; };
  document.getElementById('toReceiver').onclick = renderReceiverStep;
}
function renderReceiverStep(){
  modalContent.innerHTML = `
    <button class="back" id="backToCarrier">Voltar</button>
    <h3>Dados do Recebedor</h3>
    <div class="group"><label>Nome</label><input id="nome"></div>
    <div class="group"><label>Email</label><input id="email" type="email" placeholder="seunome@exemplo.com"></div>
    <div class="group"><label>Telefone</label><input id="telefone" placeholder="(00) 00000-0000"></div>
    <button class="primary" id="finishCheckout">SEGUIR PARA O PAGAMENTO</button>`;
  document.getElementById('backToCarrier').onclick = renderCarrierStep;
  document.getElementById('finishCheckout').onclick = ()=>{
    const nome = document.getElementById('nome').value.trim();
    const email = document.getElementById('email').value.trim();
    const telefone = document.getElementById('telefone').value.trim();
    if(!nome || !email || !telefone){ alert('Preencha todos os campos.'); return; }
    const target = state.data.checkoutUrl || 'https://google.com';
    window.location.href = target;
  }
}
function render(){
  const productId = route();
  if(productId){ const product = getProductById(productId); if(product){ renderProduct(product); return; } }
  renderHome();
}
loadData().catch(err=>{ console.error(err); app.innerHTML = '<p style="padding:40px 0">Erro ao carregar a página. Verifique se os arquivos foram enviados para a raiz do projeto.</p>'; });
</script>
</body>
</html>
